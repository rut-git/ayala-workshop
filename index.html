<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תיקיית עבודות – אילה דורלכר</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f3eee8, #fbf8f4, #efe8df);
            color: #3e352c;
            padding: 50px 10px;
            min-height: 100vh;
        }

        /* כותרת */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 4px;
            line-height: 1.3;
        }

        header h1 span:first-child {
            display: block;
            font-size: 1.1rem;
            letter-spacing: 6px;
            color: #9a8d80;
            margin-bottom: 10px;
        }

        /* תפריט */
        .family-menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 45px;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }

        .family-menu button {
            padding: 12px 25px;
            border: none;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.8);
            color: #5c5044;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .family-menu button:hover, .family-menu button.active {
            background: #cbbba8;
            color: white;
            transform: translateY(-2px);
        }

        .selected-family {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 35px;
            font-weight: 300;
        }

        /* גלריה */
        .family-gallery {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 0 5%;
            margin-bottom: 70px;
        }

        .family-gallery img, .family-gallery iframe {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: none;
            background: white;
        }

        .family-gallery img:hover {
            transform: scale(1.03);
        }

        /* עיצוב ייחודי עבור כרטיסי תמונות עם טקסט (רק עבור גלריית "all") */
        .gallery-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .image-title {
            margin-top: 12px;
            font-size: 1rem;
            color: #5c5044;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* LIGHTBOX */
        .lightbox {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .lightbox-content {
            position: relative;
            max-width: 85%;
            max-height: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox-content img, .lightbox-content iframe {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* ניווט */
        .nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            transition: 0.3s;
            user-select: none;
        }

        .nav:hover { background: rgba(255,255,255,0.2); }

        /* חץ ימינה - קדימה */
        .nav.next { right: 30px; }
        /* חץ שמאלה - אחורה */
        .nav.prev { left: 30px; }

        .nav svg {
            width: 30px;
            height: 30px;
            stroke: white;
            fill: none;
            stroke-width: 2;
        }

        /* היפוך ויזואלי של החץ שמאלה */
        .nav.prev svg { transform: rotate(180deg); }

        .close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            z-index: 2100;
        }

        .counter {
            position: absolute;
            bottom: 30px;
            color: white;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .nav { width: 45px; height: 45px; }
            .nav.next { right: 10px; }
            .nav.prev { left: 10px; }
        }
    </style>
</head>
<body>

<header>
    <h1>
        <span>תיקיית עבודות</span>
        <span>אילה דורלכר</span>
    </h1>
</header>

<div class="family-menu">
    <button data-family="guttman">משפחת גוטמן ביתר</button>
    <button data-family="rizman">משפחת רייזמן הר נוף</button>
    <button data-family="stephanski">משפחת סטפנסקי ביתר</button>
    <button data-family="frank">פראנק 35 בית וגן</button>
    <button data-family="benishu">משפחת בנישו קרית יובל</button>
    <button data-family="levi">משפחת לוי בית שמש</button>
    <button data-family="pinto">משפחת פינטו פסגת זאב</button>
    <button data-family="rizman2">משפחת רייזמן גילה</button>
    <button data-family="shimon">משפחת שמעון רחובות</button>
    <button data-family="landesman">משפחת לנדסמן</button>
    <button data-family="m">משפחת מ ירושלים</button>
    <button data-family="all">הצצה לפרויקטים נבחרים בשלבי תכנון, הדמיות וביצוע</button>

</div>

<div class="selected-family" id="selected-family"></div>

<div class="family-gallery" id="guttman"><img src="gutman/a.jpg"></div>
<div class="family-gallery" id="rizman"><img src="ris/a.png"><img src="ris/b.png"></div>
<div class="family-gallery" id="stephanski">
    <img src="mez/20240909_134059.jpg"><img src="mez/20240909_134121.jpg">
    <img src="mez/20240909_140118.jpg"><img src="mez/20240909_142351.jpg">
    <img src="mez/a.png"><img src="mez/b.png"><img src="mez/c.png"><img src="mez/d.png"><img src="mez/e.png">
</div>
<div class="family-gallery" id="frank"><img src="frank/a.png"></div>
<div class="family-gallery" id="benishu"><img src="banisho/aa.png"></div>
<div class="family-gallery" id="levi"><img src="levi/a.png"><img src="levi/b.png"><img src="levi/c.png"></div>
<div class="family-gallery" id="pinto"><img src="pinto/a.jpg"><img src="pinto/aa.png"><img src="pinto/bb.png"><img src="pinto/cc.png"><img src="pinto/dd.png"></div>
<div class="family-gallery" id="rizman2"><img src="risman/a.png"><img src="risman/b.png"><img src="risman/c.png"></div>
<div class="family-gallery" id="shimon"><img src="sui/a.png"><img src="sui/b.png"><img src="sui/c.png"></div>
<div class="family-gallery" id="landesman"><img src="landesman/aa.png"><img src="landesman/bb.png"><img src="landesman/cc.png"></div>

<div class="family-gallery" id="all">
    <div class="gallery-item">
        <img src="all/3.png">
        <div class="image-title">   בית מדרש ירושלים  </div>
    </div>
    <div class="gallery-item">
        <img src="all/4.png">
        <div class="image-title"> בית מדרש ירושלים  </div>
    </div>
        <div class="gallery-item">
        <img src="all/5.png">
        <div class="image-title"> כניסה לתלמוד תורה </div>
    </div>
        <div class="gallery-item">
        <img src="all/6.png">
        <div class="image-title"> כניסה לתלמוד תורה </div>
    </div>
        <div class="gallery-item">
        <img src="all/7.png">
        <div class="image-title"> 3 יחידות דיור בביתר </div>
    </div>
        <div class="gallery-item">
        <img src="all/8.png">
        <div class="image-title"> קליניקה טיפולית בירושלים </div>
    </div>
    <!-- את יכולה להוסיף כאן עוד תמונות באותו מבנה בדיוק -->
</div>

<div class="family-gallery" id="m"><img src="m/a.JPG"><img src="m/b.JPG"></div>


<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>

    <div class="nav prev" onclick="changeItem(-1)">
        <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
    </div>

    <div class="lightbox-content" id="lightbox-content"></div>

    <div class="nav next" onclick="changeItem(1)">
        <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
    </div>

    <div class="counter" id="counter"></div>
</div>

<script>
    const buttons = document.querySelectorAll(".family-menu button");
    const galleries = document.querySelectorAll(".family-gallery");
    const selectedTitle = document.getElementById("selected-family");
    const lightbox = document.getElementById("lightbox");
    const lightboxContent = document.getElementById("lightbox-content");
    const counterDisplay = document.getElementById("counter");

    let currentItems = [];
    let currentIndex = 0;

    buttons.forEach(btn => {
        btn.addEventListener("click", () => {
            buttons.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");

            const familyId = btn.dataset.family;
            selectedTitle.textContent = btn.textContent;

            galleries.forEach(g => {
                g.style.display = (g.id === familyId) ? "grid" : "none";
            });

            // עדכון הבחירה כך שימצא גם תמונות חופשיות וגם תמונות בתוך קופסאות
            currentItems = Array.from(document.querySelectorAll(`#${familyId} img, #${familyId} iframe`));
            
            currentItems.forEach((item, index) => {
                item.onclick = () => {
                    currentIndex = index;
                    openLightbox();
                };
            });
        });
    });

    function openLightbox() {
        lightbox.style.display = "flex";
        showItem();
    }

    function showItem() {
        const item = currentItems[currentIndex];
        if (item.tagName === "IMG") {
            lightboxContent.innerHTML = `<img src="${item.src}">`;
        } else {
            lightboxContent.innerHTML = `<iframe src="${item.src}" style="width:80vw; height:80vh;"></iframe>`;
        }
        counterDisplay.textContent = `${currentIndex + 1} / ${currentItems.length}`;
    }

    function changeItem(dir) {
        currentIndex += dir;
        if (currentIndex < 0) currentIndex = currentItems.length - 1;
        if (currentIndex >= currentItems.length) currentIndex = 0;
        showItem();
    }

    function closeLightbox() {
        lightbox.style.display = "none";
        lightboxContent.innerHTML = "";
    }

    lightbox.addEventListener("click", e => {
        if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener("keydown", e => {
        if (lightbox.style.display === "flex") {
            if (e.key === "ArrowRight") changeItem(1);
            if (e.key === "ArrowLeft") changeItem(-1);
            if (e.key === "Escape") closeLightbox();
        }
    });

    // הפעלה ראשונית
    buttons[0].click();
</script>

</body>
</html>
